<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Delivery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="Nova delivery app">
      <section id="landing-screen" class="screen active-screen" data-screen="landing">
        <header class="status-bar" aria-label="Phone status">
          <span>9:41</span>
          <div class="status-icons" aria-hidden="true">
            <span class="signal"></span>
            <span class="wifi"></span>
            <span class="battery"></span>
          </div>
        </header>

        <nav class="top-nav" aria-label="Home navigation">
          <a class="brand" href="#landing-screen" aria-label="Nova home">
            <span>no</span><span class="brand-mark">v</span><span>a</span>
          </a>

          <button class="location-pill" type="button" aria-label="Change delivery location">
            <span class="icon-circle location-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 22s7-6.15 7-13A7 7 0 0 0 5 9c0 6.85 7 13 7 13Z" />
                <circle cx="12" cy="9" r="2.3" />
              </svg>
            </span>
            <span>
              <small>Deliver to</small>
              <strong>Main Campus</strong>
            </span>
            <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </button>

          <button class="bell-button" type="button" aria-label="Notifications">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 6-3 8h18c0-2-3-1-3-8Z" />
              <path d="M10 20a2 2 0 0 0 4 0" />
            </svg>
            <span></span>
          </button>
        </nav>

        <div class="search-row">
          <label class="search-field" for="restaurant-search">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7" />
              <path d="m20 20-3.8-3.8" />
            </svg>
            <input id="restaurant-search" type="search" placeholder="Search for restaurants or cuisines" />
          </label>
          <button class="filter-button" type="button" aria-label="Open filters">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16" />
              <path d="M4 17h16" />
              <path d="M7 12h10" />
              <circle cx="9" cy="7" r="2" />
              <circle cx="15" cy="17" r="2" />
              <circle cx="12" cy="12" r="2" />
            </svg>
          </button>
        </div>

        <section class="hero" aria-labelledby="hero-title">
          <div class="hero-copy">
            <h1 id="hero-title">Good food,<br />fast delivery,<br /><span>low price.</span></h1>
            <p>Your campus, delivered.</p>
            <button class="primary-button" type="button" onclick="scrollToRestaurants()">
              Order now
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14" />
                <path d="m13 6 6 6-6 6" />
              </svg>
            </button>
          </div>
          <div class="hero-art" aria-hidden="true">
            <img src="assets/food.png" alt="" />
            <span class="price-badge">From<br /><strong>RM3.90</strong></span>
          </div>
          <div class="hero-dots" aria-hidden="true">
            <span class="active"></span>
            <span></span>
            <span></span>
          </div>
        </section>

        <section class="service-grid" aria-label="Order options">
          <button class="service-card" type="button">
            <span class="service-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 16h2l2-5h8l2 5h2" />
                <path d="M7 16a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z" />
                <path d="M17 16a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z" />
                <path d="M9 11V7h5l2 4" />
              </svg>
            </span>
            <span class="service-copy">
              <strong>Delivery</strong>
              <small>We deliver to you</small>
            </span>
            <span class="round-next" aria-hidden="true">&rsaquo;</span>
            <span class="service-meta">
              <span>15-25 min</span>
              <span>From RM3.90</span>
            </span>
          </button>

          <button class="service-card" type="button">
            <span class="service-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 8h10l1 12H6L7 8Z" />
                <path d="M9 8a3 3 0 0 1 6 0" />
              </svg>
            </span>
            <span class="service-copy">
              <strong>Pick Up</strong>
              <small>Pick up at store</small>
            </span>
            <span class="round-next" aria-hidden="true">&rsaquo;</span>
            <span class="service-meta">
              <span>5-10 min</span>
              <span>Save more</span>
            </span>
          </button>
        </section>

        <section class="category-strip" aria-label="Food categories" id="category-strip"></section>

        <section class="restaurants" id="restaurants" aria-labelledby="restaurants-title">
          <div class="section-heading">
            <h2 id="restaurants-title">All restaurants</h2>
            <button type="button" aria-label="Change restaurant sort">
              <span>Sort by</span>
              <strong>Recommended</strong>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 9 6 6 6-6" />
              </svg>
            </button>
          </div>
          <div class="restaurant-list" id="restaurant-list"></div>
        </section>
      </section>

      <section id="orders-screen" class="screen" data-screen="orders" aria-label="Orders">
        <div class="empty-screen">
          <h2>Orders</h2>
          <p>Your recent campus orders will appear here.</p>
        </div>
      </section>

      <section id="promo-screen" class="screen" data-screen="promo" aria-label="Promos">
        <div class="empty-screen">
          <h2>Promo</h2>
          <p>Deals and vouchers are coming soon.</p>
        </div>
      </section>

      <section id="profile-screen" class="screen" data-screen="profile" aria-label="Profile">
        <div class="empty-screen">
          <h2>Profile</h2>
          <p>Manage your Nova account here.</p>
        </div>
      </section>

      <nav class="bottom-nav" aria-label="Primary navigation">
        <button class="nav-item active" type="button" data-target="landing" onclick="showScreen('landing')">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 10.5 12 4l8 6.5V20H4V10.5Z" />
          </svg>
          <span>Home</span>
        </button>
        <button class="nav-item" type="button" data-target="orders" onclick="showScreen('orders')">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 4h10v16H7z" />
            <path d="M9 8h6M9 12h6" />
          </svg>
          <span>Orders</span>
        </button>
        <button class="nav-action" type="button" aria-label="Quick order" onclick="scrollToRestaurants()">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m13 2-8 12h6l-1 8 9-13h-6l1-7Z" />
          </svg>
        </button>
        <button class="nav-item" type="button" data-target="promo" onclick="showScreen('promo')">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 12 12 20 4 12l8-8 8 8Z" />
            <path d="M9 9h.01M15 15h.01" />
          </svg>
          <span>Promo</span>
        </button>
        <button class="nav-item" type="button" data-target="profile" onclick="showScreen('profile')">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 21a8 8 0 0 1 16 0" />
          </svg>
          <span>Profile</span>
        </button>
      </nav>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
